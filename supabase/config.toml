# Edge Functions: anon key만으로 호출 가능하도록 JWT 검증 비활성화
# config.toml만으로는 배포 시 반영이 안 될 수 있음 → npm run deploy:weekly-quiz 사용 권장
[functions.generate-weekly-quiz]
verify_jwt = false

[functions.generate-quiz]
verify_jwt = false

# delete-user: 로그인한 사용자만 호출 가능 (게이트웨이 JWT 검증)
[functions.delete-user]
verify_jwt = true
